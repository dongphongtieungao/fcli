<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Tubi Copilot icon — 32x32 black & white (light theme) -->

  <!-- Antenna base dot -->
  <circle cx="16" cy="3" r="2" fill="black"/>
  <!-- Antenna stem -->
  <line x1="16" y1="5" x2="16" y2="8" stroke="black" stroke-width="2" stroke-linecap="round"/>

  <!-- Robot head -->
  <rect x="4" y="8" width="24" height="18" rx="5" ry="5" fill="black"/>

  <!-- Left eye -->
  <rect x="8" y="13" width="6" height="6" rx="2" fill="white"/>
  <!-- Left eye pupil -->
  <circle cx="11" cy="16" r="1.5" fill="black"/>

  <!-- Right eye -->
  <rect x="18" y="13" width="6" height="6" rx="2" fill="white"/>
  <!-- Right eye pupil -->
  <circle cx="21" cy="16" r="1.5" fill="black"/>

  <!-- Mouth -->
  <rect x="10" y="22" width="12" height="2" rx="1" fill="white"/>
</svg>
