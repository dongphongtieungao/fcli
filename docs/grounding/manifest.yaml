version: "0.2.3"
project: ftransform
status: published
updated: "2026-06-22"
description: "Starter repository grounding registry. This file is intentionally domain-neutral but must remain populated so agents can route work to reusable source-of-truth layers."

source_groups:
  agent_policy:
    description: "Agent operating contracts and path-specific rules."
    paths:
      - AGENTS.md
      - docs/AGENTS.md
      - GEMINI.md
      - .agent/rules/
  governance:
    description: "KMS metadata, taxonomy, data governance, and reusable governance rules."
    paths:
      - docs/00-governance/
  requirements:
    description: "Requirement, business requirement, and use-case artifacts."
    paths:
      - docs/01-requirements/
  architecture:
    description: "Glossary, vision, C4, NFR, ADR, standards, and project structure."
    paths:
      - docs/02-architecture/
  business_analysis:
    description: "Business glossary, BPMN, BA notes, and workflow analysis."
    paths:
      - docs/03-business-analysis/
  specs_contracts:
    description: "API, application, schema, contract, and spec-test artifacts."
    paths:
      - docs/04-spec-test/
      - specs/
  environment:
    description: "Environment and setup guidance."
    paths:
      - docs/05-environment-setup/
  quality:
    description: "QA matrix, prompt guardrails, quality matrix, and review checklist."
    paths:
      - docs/06-quality-assurance/
      - docs/07-ci-cd-review/
  runbook_release:
    description: "DoR, DoD, runbook, handover, release, rollback, and evidence packs."
    paths:
      - docs/09-runbook/
      - docs/10-release/
  methodology:
    description: "Spec First, KMS, task lifecycle, verification, and agent workflow methodology."
    paths:
      - docs/methodology/
  grounding:
    description: "Manifest, sources, prompts, evals, and grounding skills."
    paths:
      - docs/grounding/
  antigravity:
    description: "Antigravity adapter bridge, rules, playbook, and skill wrappers for the reusable SDD workflow."
    paths:
      - GEMINI.md
      - .agent/rules/
      - .agent/skills/
      - docs/antigravity/
  workspace:
    description: "Workspace-only notes and task memory. Not official source of truth."
    paths:
      - llm-wiki/

